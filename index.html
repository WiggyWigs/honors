<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Honors — Fantasy Golf League</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="landing-page">

  <nav class="site-nav" id="site-nav">
    <a class="nav-home" href="index.html" aria-label="The Honors home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 11.5 12 4l9 7.5" />
        <path d="M5.5 9.5V20a1 1 0 0 0 1 1H9a1 1 0 0 0 1-1v-4a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v4a1 1 0 0 0 1 1h2.5a1 1 0 0 0 1-1V9.5" />
      </svg>
    </a>
    <div class="site-nav-links" id="site-nav-links">
      <a href="ohgr.html">OHGR</a>
      <a href="weekly_report.html">Weekly Report</a>
      <a href="member-profiles.html">Member Profiles</a>
      <a href="champions.html">Championship History</a>
      <span class="nav-disabled">Record Book (coming soon)</span>
    </div>
    <button class="nav-toggle" id="nav-toggle" aria-label="Open menu" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </nav>

  <section class="hero" id="hero">
    <div class="hero-bg"></div>
    <img class="hero-logo-img" src="images/logo.png" alt="The Honors crest" />
  </section>

  <script>
    // Landing page is static and non-scrolling — the only interactive
    // piece left is the mobile hamburger menu.
    const navToggle = document.getElementById('nav-toggle');
    const navLinks  = document.getElementById('site-nav-links');

    navToggle.addEventListener('click', () => {
      const isOpen = navLinks.classList.toggle('open');
      navToggle.classList.toggle('open', isOpen);
      navToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    });

    navLinks.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        navLinks.classList.remove('open');
        navToggle.classList.remove('open');
        navToggle.setAttribute('aria-expanded', 'false');
      });
    });
  </script>

</body>
</html>
