<!DOCTYPE html>
<!--
=======================================================
  THE HONORS — CHAMPIONSHIP HISTORY PAGE
=======================================================
  Portrait gallery of season champions, 2019-2025.
  Styled to match weekly-report-template.html / ohgr.html
  design system (Cinzel/IM Fell fonts, parchment palette).

  Portrait images expected at: images/2025.png ... images/2019.png

  Click any portrait to open a modal with that champion's
  season stats. All champion data lives in the CHAMPIONS
  object near the bottom of this file — edit it there, not
  in the markup, to update a year's numbers.

  DATA NOTE: Per-year champion financials (Average Score,
  Margin of Victory, Events Won, Majors Won, Net Earnings)
  were derived directly from Core_Data_AI.csv using the same
  MC/bonus/penalty/dues rules as generate_honors_data.py,
  extended to run per-year instead of only for the in-progress
  season. Net Earnings = winnings - entry fees + bonuses -
  penalties + champion payout - yearly dues + year-end awards
  share (Grand Slam bonuses/fees excluded, per Greg's instruction).

  VALIDATION CAVEAT: Summing these per-year net figures across
  all players/years lands within ~$1-$21 of the lifetime totals
  in GROUND_TRUTH_SUMMARY.md's Table 15 (which itself doesn't
  balance to $0 as the official balance rule requires -- it's off
  by -$40 lifetime). This engine's output IS internally balanced
  to $0 every year, matching Section 10.3 of the official rules.
  Flagged for Greg to reconcile against generate_financial_ground_truth.py
  if exact-to-the-penny match to GROUND_TRUTH_SUMMARY.md is required.
=======================================================
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Honors — Championship History</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;700;900&display=swap');

  :root {
    --bg-primary: #f2e4c4;
    --bg-panel: #ece0c2;
    --bg-panel-alt: #e6d9b8;
    --bg-green: #e0dcc0;
    --gold: #006747;
    --gold-light: #1a8a64;
    --silver: #4c6b48;
    --white: #1a2a18;
    --border: rgba(0, 103, 71, 0.18);
    --border-gold: rgba(0, 103, 71, 0.3);
    --red:    #a03d2f;
    --green:  #2f6b3a;
    --blue:   #2f5a8a;
    --purple: #6b4a8a;
    --yellow: #9a7d1f;
    --page-w: 1100px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--bg-primary);
    background-image: url('images/background.png');
    background-repeat: repeat-y;
    background-size: 100% auto;
    background-position: top center;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    font-family: 'IM Fell English', Georgia, serif;
    color: var(--white);
  }

  .page-outer {
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }

  .page {
    width: 100%;
    max-width: var(--page-w);
    position: relative;
    padding: 0 20px 60px;
  }

  .page::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 28px,
        rgba(0,0,0,0.012) 28px,
        rgba(0,0,0,0.012) 29px
      );
    pointer-events: none;
    z-index: 0;
  }

  .page > * { position: relative; z-index: 1; }

  /* =================== HEADER =================== */
  .champ-header {
    text-align: center;
    padding: 40px 20px 24px;
    border-bottom: 1px solid var(--border-gold);
    margin-bottom: 40px;
  }

  .champ-eyebrow {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--silver);
    margin-bottom: 10px;
  }

  .champ-title {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: 42px;
    letter-spacing: 1px;
    color: var(--gold);
  }

  .champ-subtitle {
    font-family: 'IM Fell English', Georgia, serif;
    font-style: italic;
    font-size: 18px;
    color: var(--silver);
    margin-top: 10px;
  }

  .champ-hint {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--silver);
    opacity: 0.75;
    margin-top: 14px;
  }

  /* =================== REIGNING CHAMPION =================== */
  .reigning {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 56px;
  }

  .reigning-badge {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 14px;
  }

  /* =================== PORTRAITS (clickable) =================== */
  .portrait-frame {
    box-shadow: 0 6px 18px rgba(0,0,0,0.18);
    aspect-ratio: 1085 / 1450;
    overflow: visible;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    display: block;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .portrait-frame:hover,
  .portrait-frame:focus-visible {
    transform: translateY(-4px) scale(1.015);
    box-shadow: 0 14px 28px rgba(0,0,0,0.28);
  }

  .portrait-frame:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 4px;
  }

  .reigning .portrait-frame {
    width: min(563px, 100%);
  }

  .portrait-frame img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    pointer-events: none;
  }

  /* =================== PAST CHAMPIONS GRID =================== */
  .past-heading {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--silver);
    text-align: center;
    margin-bottom: 28px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .past-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 44px 30px;
    max-width: 1040px;
    margin: 0 auto;
  }

  .past-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .past-card .portrait-frame {
    width: min(323px, 100%);
  }

  /* =================== MOBILE =================== */
  @media (max-width: 640px) {
    .champ-title { font-size: 30px; }
    .past-grid { grid-template-columns: 1fr; max-width: 340px; }
  }

  /* =================== MODAL =================== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(12, 22, 14, 0.6);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
    z-index: 1000;
  }

  .modal-overlay.active {
    opacity: 1;
    pointer-events: auto;
  }

  .modal-card {
    position: relative;
    width: 100%;
    max-width: 400px;
    max-height: 88vh;
    overflow-y: auto;
    background: #fbf6e9;
    border-radius: 16px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.35), 0 2px 0 var(--gold) inset;
    padding: 32px 28px 28px;
    text-align: center;
    transform: translateY(16px) scale(0.96);
    opacity: 0;
    transition: transform 0.28s cubic-bezier(0.2, 0.8, 0.3, 1), opacity 0.22s ease;
  }

  .modal-overlay.active .modal-card {
    transform: translateY(0) scale(1);
    opacity: 1;
  }

  .modal-close {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--silver);
    font-family: 'Cinzel', serif;
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease, color 0.15s ease;
  }

  .modal-close:hover {
    background: rgba(0, 103, 71, 0.1);
    color: var(--gold);
  }

  .modal-badge {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 4px;
  }

  .modal-name {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 24px;
    color: var(--white);
  }

  .modal-year {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 1.5px;
    color: var(--silver);
    margin-top: 4px;
    margin-bottom: 22px;
  }

  .modal-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px 28px;
    border-top: 1px solid var(--border);
    padding-top: 20px;
  }

  .modal-stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }

  .modal-stat:last-child {
    grid-column: 1 / -1;
  }

  .modal-stat-label {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--silver);
  }

  .modal-stat-value {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 17px;
    color: var(--white);
    line-height: 1.35;
  }

  @media (max-width: 480px) {
    .modal-card { padding: 26px 20px 22px; }
    .modal-name { font-size: 20px; }
  }
</style>
</head>
<body>
<div class="page-outer">
<div class="page">

  <div class="champ-header">
    <div class="champ-eyebrow">The Honors Fantasy Golf League</div>
    <div class="champ-title">Championship History</div>
    <div class="champ-subtitle">Every trophy, every season, every legend.</div>
    <div class="champ-hint">Click a portrait for season stats</div>
  </div>

  <!-- ============= REIGNING CHAMPION (2025) ============= -->
  <div class="reigning">
    <div class="reigning-badge">Reigning Champion</div>
    <button class="portrait-frame" data-year="2025" aria-label="View 2025 champion stats">
      <img src="images/2025.png" alt="Kevin McNamara, 2025 Champion">
    </button>
  </div>

  <!-- ============= PAST CHAMPIONS ============= -->
  <div class="past-heading">Past Champions</div>
  <div class="past-grid">

    <div class="past-card">
      <button class="portrait-frame" data-year="2024" aria-label="View 2024 champion stats">
        <img src="images/2024.png" alt="Kevin McNamara, 2024 Champion">
      </button>
    </div>

    <div class="past-card">
      <button class="portrait-frame" data-year="2023" aria-label="View 2023 champion stats">
        <img src="images/2023.png" alt="Greg Wigton, 2023 Champion">
      </button>
    </div>

    <div class="past-card">
      <button class="portrait-frame" data-year="2022" aria-label="View 2022 champion stats">
        <img src="images/2022.png" alt="Greg Wigton, 2022 Champion">
      </button>
    </div>

    <div class="past-card">
      <button class="portrait-frame" data-year="2021" aria-label="View 2021 champion stats">
        <img src="images/2021.png" alt="Kevin McNamara, 2021 Champion">
      </button>
    </div>

    <div class="past-card">
      <button class="portrait-frame" data-year="2020" aria-label="View 2020 champion stats">
        <img src="images/2020.png" alt="Robert Bresnahan, 2020 Champion">
      </button>
    </div>

    <div class="past-card">
      <button class="portrait-frame" data-year="2019" aria-label="View 2019 champion stats">
        <img src="images/2019.png" alt="Kevin McNamara, 2019 Champion">
      </button>
    </div>

  </div>

</div>
</div>

<!-- ============= STAT MODAL ============= -->
<div class="modal-overlay" id="statModal" aria-hidden="true">
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalName">
    <button class="modal-close" id="modalClose" aria-label="Close">&times;</button>
    <div class="modal-badge">Season Champion</div>
    <div class="modal-name" id="modalName"></div>
    <div class="modal-year" id="modalYear"></div>
    <div class="modal-stats">
      <div class="modal-stat">
        <span class="modal-stat-label">Average Score</span>
        <span class="modal-stat-value" id="modalAvg"></span>
      </div>
      <div class="modal-stat">
        <span class="modal-stat-label">Margin of Victory</span>
        <span class="modal-stat-value" id="modalMargin"></span>
      </div>
      <div class="modal-stat">
        <span class="modal-stat-label">Events Won</span>
        <span class="modal-stat-value" id="modalEvents"></span>
      </div>
      <div class="modal-stat">
        <span class="modal-stat-label">Earnings</span>
        <span class="modal-stat-value" id="modalEarnings"></span>
      </div>
      <div class="modal-stat">
        <span class="modal-stat-label">Majors Won</span>
        <span class="modal-stat-value" id="modalMajors"></span>
      </div>
    </div>
  </div>
</div>

<script>
  var CHAMPIONS = {
    2025: { name: "Kevin McNamara",    avg: "414.65", margin: "73.2 pts",  events: "5",  earnings: "$358.00", majors: "U.S. Open" },
    2024: { name: "Kevin McNamara",    avg: "443.27", margin: "571.4 pts", events: "10", earnings: "$532.00", majors: "The Open Championship" },
    2023: { name: "Greg Wigton",       avg: "428.07", margin: "128.5 pts", events: "7",  earnings: "$516.50", majors: "The Masters<br>The Open Championship" },
    2022: { name: "Greg Wigton",       avg: "403.30", margin: "96.6 pts",  events: "6",  earnings: "$216.00", majors: "None" },
    2021: { name: "Kevin McNamara",    avg: "412.15", margin: "218.1 pts", events: "9",  earnings: "$445.00", majors: "The Masters" },
    2020: { name: "Robert Bresnahan",  avg: "422.26", margin: "301.3 pts", events: "8",  earnings: "$683.00", majors: "The PGA Championship<br>U.S. Open" },
    2019: { name: "Kevin McNamara",    avg: "426.17", margin: "314.5 pts", events: "4",  earnings: "$270.00", majors: "The Open Championship<br>The PGA Championship" }
  };

  var overlay   = document.getElementById('statModal');
  var closeBtn  = document.getElementById('modalClose');
  var lastFocused = null;

  function openModal(year) {
    var c = CHAMPIONS[year];
    if (!c) return;
    document.getElementById('modalName').textContent = c.name;
    document.getElementById('modalYear').textContent = year + ' Season Champion';
    document.getElementById('modalAvg').textContent = c.avg;
    document.getElementById('modalMargin').textContent = c.margin;
    document.getElementById('modalEvents').textContent = c.events;
    document.getElementById('modalEarnings').textContent = c.earnings;
    document.getElementById('modalMajors').innerHTML = c.majors;

    lastFocused = document.activeElement;
    overlay.classList.add('active');
    overlay.setAttribute('aria-hidden', 'false');
    closeBtn.focus();
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    overlay.classList.remove('active');
    overlay.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
    if (lastFocused) lastFocused.focus();
  }

  document.querySelectorAll('.portrait-frame').forEach(function (btn) {
    btn.addEventListener('click', function () {
      openModal(btn.getAttribute('data-year'));
    });
  });

  closeBtn.addEventListener('click', closeModal);

  overlay.addEventListener('click', function (e) {
    if (e.target === overlay) closeModal();
  });

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && overlay.classList.contains('active')) closeModal();
  });
</script>
</body>
</html>
